org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# --- Workarounds para Kotlin 2.3.x no Windows ---
# O cache incremental do Kotlin 2.3 (BTAPI) tem um bug que falha ao
# fechar os arquivos .tab quando os fontes do projeto e o pub-cache
# ficam em drives diferentes (ex.: D:\projeto e C:\Users\...\Pub\Cache).
# Mesmo após mover o pub-cache para o mesmo drive (D:\.pub-cache), o
# daemon ainda reaproveita registros de storage entre compilações.
#
# Solução estável: desabilitar a compilação incremental do Kotlin.
# Plugins Flutter mudam raramente, então o custo é desprezível.
kotlin.incremental=false
kotlin.compiler.runViaBuildToolsApi=false
